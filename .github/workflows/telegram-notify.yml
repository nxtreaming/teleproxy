name: Issue Notifications

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: telegram-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
        with:
          script: |
            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;
            const groupId = process.env.TELEGRAM_GROUP_ID;
            if (!token || !chatId) return;

            function mdToHtml(md) {
              let s = md;
              s = s.replace(/&/g, '&amp;');
              s = s.replace(/</g, '&lt;');
              s = s.replace(/>/g, '&gt;');
              s = s.replace(/^#{1,6}\s+(.+)$/gm, '<b>$1</b>');
              s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
              s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
              s = s.replace(/__(.+?)__/g, '<b>$1</b>');
              s = s.replace(/(?<!\w)\*([^*]+)\*(?!\w)/g, '<i>$1</i>');
              s = s.replace(/(?<!\w)_([^_]+)_(?!\w)/g, '<i>$1</i>');
              s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
              return s;
            }

            async function tgApi(method, body) {
              const resp = await fetch(`https://api.telegram.org/bot${token}/${method}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
              });
              return resp.json();
            }

            async function findThreadId(issueNumber) {
              if (!groupId) return null;
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100
              });
              for (const c of comments.data) {
                const match = c.body.match(/<!-- tg_thread_id:(\d+) -->/);
                if (match) return parseInt(match[1], 10);
              }
              return null;
            }

            async function captureThreadId(channelMsgId) {
              if (!groupId) return null;
              const updates = await tgApi('getUpdates', {
                timeout: 10,
                allowed_updates: ['message']
              });
              if (!updates.ok || !updates.result.length) return null;

              let threadId = null;
              for (const u of updates.result) {
                const m = u.message;
                if (!m || !m.is_automatic_forward) continue;
                if (m.forward_origin && m.forward_origin.message_id === channelMsgId) {
                  threadId = m.message_id;
                  break;
                }
              }

              const lastId = updates.result[updates.result.length - 1].update_id;
              await tgApi('getUpdates', { offset: lastId + 1 });

              return threadId;
            }

            const event = context.eventName;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (event === 'issues' && context.payload.action === 'opened') {
              const i = context.payload.issue;
              if (i.user.type === 'Bot' || i.user.login === 'rkline0x') return;

              const text = `📋 <b>New Issue #${i.number}</b>: ${i.title}\n\nby ${i.user.login}\n<a href="${i.html_url}">View issue</a>`;

              const result = await tgApi('sendMessage', {
                chat_id: chatId,
                text: text,
                parse_mode: 'HTML',
                disable_web_page_preview: true
              });

              if (!result.ok) {
                core.setFailed(`Telegram notification failed: ${JSON.stringify(result)}`);
                return;
              }

              const channelMsgId = result.result.message_id;
              const threadId = await captureThreadId(channelMsgId);

              const lines = [
                `Thanks for opening an issue! A maintainer will review it soon.`,
                ``,
                `For project updates, join [@teleproxy_dev](https://t.me/teleproxy_dev) on Telegram.`,
                `Issues without community interest may be closed after 60 days of inactivity.`,
                ``,
                `---`,
                ``,
                `**Teleproxy is built and maintained by a single developer.** If it saves you time or keeps your users connected, consider supporting the project:`,
                ``,
                `| | |`,
                `|---|---|`,
                `| 💳 | **[Donate via Tribute](https://t.me/tribute/app?startapp=dIa9)** (cards, worldwide) |`,
                `| 💎 | **[TON](https://app.tonkeeper.com/transfer/UQCRB931D__Q2YQmAbUfcuHQ7fHsG3_3At7e6pUtNa6b9bTh)** \`UQCRB931D...b9bTh\` |`,
              ];

              if (threadId) {
                lines.push(`\n<!-- tg_thread_id:${threadId} -->`);
              }

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: i.number,
                body: lines.join('\n')
              });

            } else if (event === 'issue_comment' && context.payload.action === 'created') {
              const c = context.payload.comment;
              if (c.user.login !== 'rkline0x') return;
              if (c.user.type === 'Bot') return;
              const i = context.payload.issue;
              const snippet = mdToHtml(c.body.substring(0, 2000));
              const text = `💬 <b>Comment on #${i.number}</b>: ${i.title}\n\n${snippet}\n\n<a href="${c.html_url}">View comment</a>`;

              const threadId = await findThreadId(i.number);
              if (threadId && groupId) {
                const result = await tgApi('sendMessage', {
                  chat_id: groupId,
                  message_thread_id: threadId,
                  text: text,
                  parse_mode: 'HTML',
                  disable_web_page_preview: true
                });
                if (!result.ok) {
                  core.warning(`Thread reply failed, falling back to channel: ${JSON.stringify(result)}`);
                } else {
                  return;
                }
              }

              const result = await tgApi('sendMessage', {
                chat_id: chatId,
                text: text,
                parse_mode: 'HTML',
                disable_web_page_preview: true
              });
              if (!result.ok) {
                core.setFailed(`Telegram notification failed: ${JSON.stringify(result)}`);
              }
            }
