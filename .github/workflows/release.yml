name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build static binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD:/src" -w /src alpine:3.21 sh -c "
              apk add --no-cache build-base openssl-dev openssl-libs-static zlib-dev zlib-static linux-headers git
              git config --global --add safe.directory /src
              make clean
              make -j\$(nproc) EXTRA_VERSION=${VERSION} EXTRA_LDFLAGS='-static'
            "

      - name: Verify static linking
        run: |
          file objs/bin/mtproto-proxy | tee /dev/stderr | grep -q "statically linked"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtproto-proxy-linux-${{ matrix.arch }}
          path: objs/bin/mtproto-proxy

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/mtproto-proxy-linux-amd64/mtproto-proxy release/mtproto-proxy-linux-amd64
          cp artifacts/mtproto-proxy-linux-arm64/mtproto-proxy release/mtproto-proxy-linux-arm64
          chmod +x release/mtproto-proxy-linux-*
          cd release
          sha256sum mtproto-proxy-linux-* > SHA256SUMS

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release-notes.md

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: env.TELEGRAM_BOT_TOKEN != ''
        run: |
          TAG="${GITHUB_REF_NAME}"
          BODY=$(cat release-notes.md | head -c 2000)
          # Convert Markdown to Telegram HTML
          BODY=$(echo "$BODY" | sed \
            -e 's/&/\&amp;/g' \
            -e 's/</\&lt;/g' \
            -e 's/>/\&gt;/g' \
            -e 's/^###* \(.*\)$/<b>\1<\/b>/g' \
            -e 's/`\([^`]*\)`/<code>\1<\/code>/g' \
            -e 's/\*\*\([^*]*\)\*\*/<b>\1<\/b>/g')
          TEXT=$(printf '🚀 <b>New Release: %s</b>\n\n%s\n\n<a href="https://github.com/%s/releases/tag/%s">Release notes</a> | <a href="https://github.com/%s">GitHub</a>' \
            "$TAG" "$BODY" "${{ github.repository }}" "$TAG" "${{ github.repository }}")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')"
