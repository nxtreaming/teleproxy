services:
  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - SECRET=${TELEPROXY_SECRET}
      - PORT=8443
      - WORKERS=0
      - DIRECT_MODE=true
      - PREFER_IPV6=true
      - BIND_ADDRESS=127.0.0.1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8888/stats || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
  tester:
    build: .
    environment:
      - TELEPROXY_HOST=teleproxy
      - TELEPROXY_PORT=8443
      - TELEPROXY_STATS_PORT=8888
    depends_on:
      teleproxy:
        condition: service_healthy
    command: ["python", "test_bind_address.py"]
