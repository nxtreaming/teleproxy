services:
  tls-backend:
    build: ./tls-backend
    networks:
      tlsnet:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "echo Q | openssl s_client -connect localhost:443 2>/dev/null | grep -q 'Verify return code'"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  mtproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    environment:
      - SECRET=${MTPROXY_SECRET_1},${MTPROXY_SECRET_2}
      - PORT=8443
      - STATS_PORT=8888
      - EE_DOMAIN=172.30.0.10
      - WORKERS=0
    networks:
      - tlsnet
    depends_on:
      tls-backend:
        condition: service_healthy

  tester:
    build: .
    environment:
      - MTPROXY_HOST=mtproxy
      - MTPROXY_PORT=8443
      - MTPROXY_STATS_PORT=8888
      - MTPROXY_SECRETS=${MTPROXY_SECRET_1},${MTPROXY_SECRET_2}
      - EE_DOMAIN=172.30.0.10
    networks:
      - tlsnet
    depends_on:
      - mtproxy
    command: ["python", "test_multi_secret_tls.py"]

networks:
  tlsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
