services:
  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - SECRET=${TELEPROXY_SECRET:-d41d8cd98f00b204e9800998ecf8427e}
      - PORT=8443
      - STATS_PORT=8888
      - WORKERS=0
      - DIRECT_MODE=true
      - DC_PROBE_INTERVAL=5
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/stats || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  tester:
    build: .
    environment:
      - TELEPROXY_HOST=teleproxy
      - TELEPROXY_STATS_PORT=8888
    depends_on:
      teleproxy:
        condition: service_healthy
    command: ["python", "test_dc_probes.py"]
