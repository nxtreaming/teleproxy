services:
  mtproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    ports:
      - "18443:8443"
      - "18888:8888"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - SECRET=${MTPROXY_SECRET}
      - PORT=8443
      - WORKERS=1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/stats || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
  tester:
    build: .
    environment:
      - MTPROXY_HOST=mtproxy
      - MTPROXY_PORT=8443
      - MTPROXY_STATS_PORT=8888
    depends_on:
      mtproxy:
        condition: service_healthy