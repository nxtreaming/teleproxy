services:
  tls-backend:
    build: ./tls-backend
    networks:
      tlsnet:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "echo Q | openssl s_client -connect localhost:443 2>/dev/null | grep -q 'Verify return code'"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  mtproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    environment:
      - SECRET=${MTPROXY_SECRET:-d41d8cd98f00b204e9800998ecf8427e}
      - PORT=8443
      - STATS_PORT=8888
      # Use IP directly — gethostbyname() can't resolve Docker service names
      # reliably during the early TLS probing phase
      - EE_DOMAIN=172.30.0.10
      - WORKERS=0
    networks:
      - tlsnet
    depends_on:
      tls-backend:
        condition: service_healthy

  tester:
    build: .
    environment:
      - MTPROXY_HOST=mtproxy
      - MTPROXY_PORT=8443
      - MTPROXY_STATS_PORT=8888
      - MTPROXY_SECRET=${MTPROXY_SECRET:-d41d8cd98f00b204e9800998ecf8427e}
      - TLS_BACKEND_HOST=tls-backend
      - TLS_BACKEND_PORT=443
      # Must match EE_DOMAIN in mtproxy service (used for ee secret in Telethon test)
      - EE_DOMAIN=172.30.0.10
    networks:
      - tlsnet
    depends_on:
      - mtproxy
    command: ["python", "test_tls_e2e.py"]

networks:
  tlsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
