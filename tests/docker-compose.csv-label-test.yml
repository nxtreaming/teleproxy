services:
  tls-backend:
    build: ./tls-backend
    networks:
      tlsnet:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "echo Q | openssl s_client -connect localhost:443 2>/dev/null | grep -q 'Verify return code'"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    environment:
      # Comma-separated SECRET with hex:label syntax (the path #67 fixed).
      - SECRET=${TELEPROXY_SECRET_1}:family,${TELEPROXY_SECRET_2}:friends
      - PORT=8443
      - STATS_PORT=8888
      - EE_DOMAIN=172.30.0.10
      - WORKERS=0
    networks:
      - tlsnet
    depends_on:
      tls-backend:
        condition: service_healthy

  tester:
    build: .
    environment:
      - TELEPROXY_HOST=teleproxy
      - TELEPROXY_PORT=8443
      - TELEPROXY_STATS_PORT=8888
      - TELEPROXY_SECRET_1=${TELEPROXY_SECRET_1}
      - TELEPROXY_SECRET_2=${TELEPROXY_SECRET_2}
      - EE_DOMAIN=172.30.0.10
    networks:
      - tlsnet
    depends_on:
      - teleproxy
    command: ["python", "test_secret_csv_label.py"]

networks:
  tlsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
